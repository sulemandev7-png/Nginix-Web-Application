version: '3'
services:

  frontend:
    image: suleman08/nginix-practice-image:frontend-latest
    expose:
      - "80"

  backend:
    image: suleman08/nginix-practice-image:backend-latest
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-certs:/etc/letsencrypt        
      - certbot-www:/var/www/certbot          
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-certs:/etc/letsencrypt        
      - certbot-www:/var/www/certbot          
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot;
        sleep 12h & wait $${!};
      done"

volumes:
  certbot-certs:
  certbot-www: