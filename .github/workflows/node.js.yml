name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nginix-practice-image:frontend-latest ./frontend

      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nginix-practice-image:backend-latest ./backend

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nginix-practice-image:frontend-latest

      - name: Push Backend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nginix-practice-image:backend-latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Nginix-Web-Application

            git pull origin main

            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            sudo docker compose pull
            sudo docker compose down
            sudo docker compose up -d

            sudo docker ps
```