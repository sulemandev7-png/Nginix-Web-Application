name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend
        run: |
          docker build -t suleman08/nginix-practice-image:frontend-v1 ./frontend

      - name: Build Backend
        run: |
          docker build -t suleman08/nginix-practice-image:backend-v1 ./backend

      - name: Push Frontend
        run: |
          docker push suleman08/nginix-practice-image:frontend-v1

      - name: Push Backend
        run: |
          docker push suleman08/nginix-practice-image:backend-v1

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~
            sudo docker compose pull
            sudo docker compose up -d
